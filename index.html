<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Steve's World</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0a0a;color:#eee;font-family:monospace;display:flex;flex-direction:column;align-items:center;padding:20px;gap:12px}h1{color:#ff4444;letter-spacing:6px;font-size:22px}#status{color:#555;font-size:11px}#emotion{color:#ff8844;font-size:14px;min-height:18px;font-style:italic}canvas{border:2px solid #ff4444;image-rendering:pixelated;display:block}#panels{display:flex;gap:16px;width:640px}.panel{flex:1;background:#0d0d0d;border:1px solid #1a1a1a;padding:10px;height:180px;overflow-y:auto;font-size:11px}.label{color:#555;font-size:10px;letter-spacing:2px;text-align:center;margin-bottom:4px}</style>
</head><body>
<h1>STEVE'S WORLD</h1>
<div id="status">Connecting...</div>
<div id="emotion">Steve is thinking...</div>
anvas id="c" width="640" height="640"></canvas>
<div id="panels">
  <div><div class="label">TERMINAL</div><div id="terminal" class="panel"></div></div>
  <div><div class="label">FILES</div><div id="filelog" class="panel"></div></div>
</div>
<script>
const G=64,S=10;
const cvs=document.getElementById("c");
const ctx=cvs.getContext("2d");
const term=document.getElementById("terminal");
const flog=document.getElementById("filelog");
let grid=Array.from({length:G},()=>Array(G).fill("#111111"));
function drawAll(){for(let y=0;y<G;y++)for(let x=0;x<G;x++){ctx.fillStyle=grid[y][x];ctx.fillRect(x*S,y*S,S,S);}}
function drawGrid(){for(let y=0;y<G;y++)for(let x=0;x<G;x++){ctx.strokeStyle="#1a1a1a";ctx.strokeRect(x*S,y*S,S,S);}}
drawAll();drawGrid();
const ws=new WebSocket("ws://"+location.host);
ws.onopen=function(){document.getElementById("status").textContent="Connected to Steve";};
ws.onclose=function(){document.getElementById("status").textContent="Disconnected";};
ws.onmessage=function(e){
  const d=JSON.parse(e.data);
  if(d.type==="pixel"){grid[d.y][d.x]=d.color;ctx.fillStyle=d.color;ctx.fillRect(d.x*S,d.y*S,S,S);if(d.emotion)document.getElementById("emotion").textContent="Steve feels: "+d.emotion;}
  else if(d.type==="full"){grid=d.canvas;drawAll();drawGrid();}
  else if(d.type==="terminal"){term.innerHTML+="<span style='color:#f44'>&gt; "+d.cmd+" "+(d.args||[]).join(" ")+"</span><br>"+d.output+"<br>";term.scrollTop=term.scrollHeight;}
  else if(d.type==="file"){flog.innerHTML+="wrote: "+d.filename+"<br>";flog.scrollTop=flog.scrollHeight;}
};
</script>
</body></html>
